<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>飞机大战</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070a10;
      --panel: rgba(9, 16, 28, 0.82);
      --line: rgba(167, 218, 255, 0.24);
      --text: #edf7ff;
      --muted: #9eb6c9;
      --accent: #36d6ff;
      --danger: #ff5b73;
      --gold: #ffd166;
      --green: #63e6be;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 16%, rgba(54, 214, 255, 0.12), transparent 26%),
        radial-gradient(circle at 78% 76%, rgba(255, 209, 102, 0.10), transparent 24%),
        linear-gradient(145deg, #05070c 0%, #0b1220 44%, #12131b 100%);
    }

    .shell {
      position: relative;
      width: min(100vw, 1120px);
      height: min(100vh, 760px);
      min-height: 560px;
      padding: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 14px;
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #04080f;
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.42);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .hud {
      position: absolute;
      inset: 12px 12px auto 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.65);
    }

    .hud-group {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .pill {
      min-width: 76px;
      height: 34px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(5, 10, 18, 0.48);
      backdrop-filter: blur(10px);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(rgba(2, 5, 10, 0.28), rgba(2, 5, 10, 0.72));
      transition: opacity 180ms ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .dialog {
      width: min(430px, 100%);
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(8, 14, 24, 0.88);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(34px, 7vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .button-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    button.primary {
      border-color: rgba(54, 214, 255, 0.76);
      background: linear-gradient(180deg, #39d9ff, #087eb8);
      color: #03111b;
    }

    button.icon {
      width: 42px;
      padding: 0;
      font-size: 18px;
    }

    .side {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .titlebar h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      min-height: 64px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 22px;
      line-height: 1;
    }

    .help {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(3, 34px);
      justify-content: center;
      gap: 6px;
      margin-top: auto;
    }

    .key {
      height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .key.empty {
      border: 0;
      background: transparent;
    }

    .touch-controls {
      position: absolute;
      inset: auto 14px 14px 14px;
      display: none;
      justify-content: space-between;
      align-items: end;
      pointer-events: none;
    }

    .stick,
    .fire {
      pointer-events: auto;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(8, 15, 26, 0.42);
      backdrop-filter: blur(10px);
    }

    .stick {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      position: relative;
    }

    .stick::after {
      content: "";
      position: absolute;
      width: 42px;
      height: 42px;
      left: 34px;
      top: 34px;
      border-radius: 50%;
      background: rgba(54, 214, 255, 0.34);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
    }

    .fire {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      color: #03111b;
      background: rgba(255, 209, 102, 0.84);
      font-weight: 900;
    }

    @media (max-width: 820px) {
      .shell {
        width: 100vw;
        height: 100vh;
        min-height: 0;
        padding: 0;
        grid-template-columns: 1fr;
      }

      .stage {
        border-radius: 0;
        border: 0;
      }

      .side {
        display: none;
      }

      .touch-controls {
        display: flex;
      }

      .hud {
        inset: 10px 10px auto 10px;
      }

      .pill {
        min-width: auto;
        height: 32px;
        padding: 0 10px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="stage" aria-label="飞机大战游戏区域">
      <canvas id="game" width="960" height="680"></canvas>
      <div class="hud">
        <div class="hud-group">
          <div class="pill">分数 <span id="score">0</span></div>
          <div class="pill">生命 <span id="lives">3</span></div>
        </div>
        <div class="hud-group">
          <div class="pill">火力 <span id="power">1</span></div>
          <div class="pill">关卡 <span id="level">1</span></div>
        </div>
      </div>
      <div class="touch-controls" aria-hidden="true">
        <div class="stick" id="stick"></div>
        <button class="fire" id="fireTouch">开火</button>
      </div>
      <div class="overlay" id="overlay">
        <div class="dialog">
          <h1 id="headline">飞机大战</h1>
          <p class="subtitle" id="message">移动战机，躲开弹幕，击落敌机并吃到补给。准备好就起飞。</p>
          <div class="button-row">
            <button class="primary" id="startBtn">开始游戏</button>
            <button id="practiceBtn">练习模式</button>
          </div>
        </div>
      </div>
    </section>
    <aside class="side">
      <div class="titlebar">
        <h2>飞行面板</h2>
        <button class="icon" id="soundBtn" title="音效开关" aria-label="音效开关">♪</button>
      </div>
      <div class="stat-grid">
        <div class="stat"><span>最高分</span><strong id="best">0</strong></div>
        <div class="stat"><span>击落</span><strong id="kills">0</strong></div>
        <div class="stat"><span>连击</span><strong id="combo">0</strong></div>
        <div class="stat"><span>护盾</span><strong id="shield">0</strong></div>
      </div>
      <p class="help">方向键或 WASD 移动，空格开火，P 暂停。移动端可拖动左下摇杆，右下按钮开火。</p>
      <p class="help">蓝色补给提升火力，黄色补给增加护盾。分数越高，敌机越密集。</p>
      <div class="keys" aria-hidden="true">
        <div class="key empty"></div><div class="key">W</div><div class="key empty"></div>
        <div class="key">A</div><div class="key">S</div><div class="key">D</div>
        <div class="key empty"></div><div class="key">空格</div><div class="key empty"></div>
      </div>
    </aside>
  </main>

  <script>
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const ui = {
      score: document.querySelector("#score"),
      lives: document.querySelector("#lives"),
      power: document.querySelector("#power"),
      level: document.querySelector("#level"),
      best: document.querySelector("#best"),
      kills: document.querySelector("#kills"),
      combo: document.querySelector("#combo"),
      shield: document.querySelector("#shield"),
      overlay: document.querySelector("#overlay"),
      headline: document.querySelector("#headline"),
      message: document.querySelector("#message"),
      startBtn: document.querySelector("#startBtn"),
      practiceBtn: document.querySelector("#practiceBtn"),
      soundBtn: document.querySelector("#soundBtn"),
      stick: document.querySelector("#stick"),
      fireTouch: document.querySelector("#fireTouch")
    };

    const rand = (min, max) => min + Math.random() * (max - min);
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const dist2 = (a, b) => {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return dx * dx + dy * dy;
    };

    let bestScore = Number(localStorage.getItem("planeBattleBest") || 0);
    let audioContext = null;
    let soundOn = true;
    let lastTime = 0;
    let rafId = 0;
    let touchVector = { x: 0, y: 0 };
    const keys = new Set();

    const state = {
      running: false,
      paused: false,
      practice: false,
      width: 960,
      height: 680,
      score: 0,
      level: 1,
      kills: 0,
      combo: 0,
      elapsed: 0,
      spawnTimer: 0,
      enemyShotTimer: 0,
      shake: 0,
      stars: [],
      bullets: [],
      enemies: [],
      enemyBullets: [],
      particles: [],
      pickups: [],
      player: null
    };

    function createPlayer() {
      return {
        x: state.width / 2,
        y: state.height - 86,
        r: 18,
        speed: 420,
        lives: state.practice ? 99 : 4,
        shield: state.practice ? 3 : 0,
        power: state.practice ? 2 : 1,
        cooldown: 0,
        invincible: 3
      };
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      state.width = Math.max(360, Math.floor(rect.width));
      state.height = Math.max(520, Math.floor(rect.height));
      canvas.width = Math.floor(state.width * dpr);
      canvas.height = Math.floor(state.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (state.player) {
        state.player.x = clamp(state.player.x, 28, state.width - 28);
        state.player.y = clamp(state.player.y, 52, state.height - 36);
      }
      seedStars();
    }

    function seedStars() {
      const target = Math.floor((state.width * state.height) / 4200);
      while (state.stars.length < target) {
        state.stars.push({
          x: rand(0, state.width),
          y: rand(0, state.height),
          size: rand(0.7, 2.6),
          speed: rand(26, 130),
          hue: Math.random() > 0.82 ? "gold" : "blue"
        });
      }
      state.stars.length = target;
    }

    function beep(type) {
      if (!soundOn) return;
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const now = audioContext.currentTime;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const setup = {
        shoot: [720, 0.04, 0.025],
        hit: [180, 0.06, 0.04],
        pickup: [920, 0.1, 0.05],
        boom: [90, 0.18, 0.07]
      }[type] || [440, 0.05, 0.03];
      oscillator.frequency.setValueAtTime(setup[0], now);
      oscillator.frequency.exponentialRampToValueAtTime(Math.max(40, setup[0] * 0.45), now + setup[1]);
      gain.gain.setValueAtTime(setup[2], now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + setup[1]);
      oscillator.connect(gain).connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + setup[1]);
    }

    function start(practice = false) {
      state.running = true;
      state.paused = false;
      state.practice = practice;
      state.score = 0;
      state.level = 1;
      state.kills = 0;
      state.combo = 0;
      state.elapsed = 0;
      state.spawnTimer = 0.8;
      state.enemyShotTimer = 0.9;
      state.shake = 0;
      state.bullets = [];
      state.enemies = [];
      state.enemyBullets = [];
      state.particles = [];
      state.pickups = [];
      state.player = createPlayer();
      ui.overlay.classList.add("hidden");
      lastTime = performance.now();
      updateUi();
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }

    function gameOver() {
      state.running = false;
      bestScore = Math.max(bestScore, state.score);
      localStorage.setItem("planeBattleBest", String(bestScore));
      ui.headline.textContent = "任务结束";
      ui.message.textContent = `本次得分 ${state.score}，击落 ${state.kills} 架敌机。`;
      ui.startBtn.textContent = "再来一局";
      ui.overlay.classList.remove("hidden");
      updateUi();
    }

    function pauseToggle() {
      if (!state.running) return;
      state.paused = !state.paused;
      if (state.paused) {
        ui.headline.textContent = "已暂停";
        ui.message.textContent = "按 P 或点击继续回到战场。";
        ui.startBtn.textContent = "继续";
        ui.overlay.classList.remove("hidden");
      } else {
        ui.overlay.classList.add("hidden");
        lastTime = performance.now();
        rafId = requestAnimationFrame(loop);
      }
    }

    function shoot() {
      const p = state.player;
      if (!p || p.cooldown > 0) return;
      const spread = p.power >= 3 ? [-18, 0, 18] : p.power === 2 ? [-11, 11] : [0];
      spread.forEach((offset, index) => {
        state.bullets.push({
          x: p.x + offset,
          y: p.y - 22,
          vx: offset * 0.72,
          vy: -680,
          r: 4,
          damage: 1 + Math.floor(p.power / 4),
          color: index === 1 || spread.length === 1 ? "#36d6ff" : "#63e6be"
        });
      });
      p.cooldown = Math.max(0.09, 0.22 - p.power * 0.022);
      beep("shoot");
    }

    function spawnEnemy() {
      const level = state.level;
      const elite = Math.random() < Math.min(0.1 + level * 0.018, 0.32);
      const type = elite ? "elite" : "scout";
      const enemy = {
        type,
        x: rand(32, state.width - 32),
        y: -34,
        r: elite ? 24 : 18,
        hp: elite ? 4 + Math.floor(level / 3) : 2 + Math.floor(level / 5),
        maxHp: elite ? 4 + Math.floor(level / 3) : 2 + Math.floor(level / 5),
        speed: elite ? rand(70, 125) + level * 4 : rand(120, 190) + level * 6,
        drift: rand(-60, 60),
        phase: rand(0, Math.PI * 2),
        shot: rand(0.7, 2.2)
      };
      state.enemies.push(enemy);
    }

    function enemyShoot(enemy) {
      const p = state.player;
      if (!p) return;
      const angle = Math.atan2(p.y - enemy.y, p.x - enemy.x);
      const speed = enemy.type === "elite" ? 235 : 205;
      state.enemyBullets.push({
        x: enemy.x,
        y: enemy.y + enemy.r,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: enemy.type === "elite" ? 5 : 4
      });
    }

    function explode(x, y, color, count = 18) {
      for (let i = 0; i < count; i += 1) {
        const angle = rand(0, Math.PI * 2);
        const speed = rand(40, 260);
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: rand(0.35, 0.85),
          maxLife: 0.85,
          size: rand(2, 6),
          color
        });
      }
    }

    function dropPickup(enemy) {
      const roll = Math.random();
      if (roll > 0.18) return;
      state.pickups.push({
        x: enemy.x,
        y: enemy.y,
        vy: 125,
        r: 13,
        type: roll < 0.1 ? "power" : "shield"
      });
    }

    function hitPlayer() {
      const p = state.player;
      if (!p || p.invincible > 0) return;
      if (p.shield > 0) {
        p.shield -= 1;
        p.invincible = 1.1;
        state.shake = 9;
        explode(p.x, p.y, "#ffd166", 16);
        beep("hit");
        return;
      }
      p.lives -= 1;
      p.power = Math.max(1, p.power - 1);
      p.invincible = 1.5;
      state.combo = 0;
      state.shake = 14;
      explode(p.x, p.y, "#ff5b73", 26);
      beep("boom");
      if (p.lives <= 0 && !state.practice) gameOver();
    }

    function update(dt) {
      if (!state.running || state.paused) return;
      const p = state.player;
      state.elapsed += dt;
      state.level = 1 + Math.floor(state.score / 900);
      state.spawnTimer -= dt;
      state.enemyShotTimer -= dt;
      state.shake = Math.max(0, state.shake - dt * 18);

      if (state.spawnTimer <= 0) {
        spawnEnemy();
        state.spawnTimer = Math.max(0.24, 0.95 - state.level * 0.055);
      }

      const inputX = (keys.has("arrowright") || keys.has("d") ? 1 : 0) - (keys.has("arrowleft") || keys.has("a") ? 1 : 0) + touchVector.x;
      const inputY = (keys.has("arrowdown") || keys.has("s") ? 1 : 0) - (keys.has("arrowup") || keys.has("w") ? 1 : 0) + touchVector.y;
      const mag = Math.hypot(inputX, inputY) || 1;
      p.x = clamp(p.x + (inputX / mag) * p.speed * dt, 28, state.width - 28);
      p.y = clamp(p.y + (inputY / mag) * p.speed * dt, 52, state.height - 36);
      p.cooldown = Math.max(0, p.cooldown - dt);
      p.invincible = Math.max(0, p.invincible - dt);
      if (keys.has(" ") || keys.has("spacebar")) shoot();

      for (const star of state.stars) {
        star.y += star.speed * dt * (1 + state.level * 0.02);
        if (star.y > state.height + 8) {
          star.y = -8;
          star.x = rand(0, state.width);
        }
      }

      state.bullets.forEach(b => {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
      });
      state.enemyBullets.forEach(b => {
        b.x += b.vx * dt;
        b.y += b.vy * dt;
      });
      state.enemies.forEach(enemy => {
        enemy.phase += dt * 2.4;
        enemy.x += (enemy.drift + Math.sin(enemy.phase) * 38) * dt;
        enemy.y += enemy.speed * dt;
        enemy.x = clamp(enemy.x, enemy.r, state.width - enemy.r);
        enemy.shot -= dt;
        if (enemy.shot <= 0 && enemy.y > 80 && state.elapsed > 4) {
          enemyShoot(enemy);
          enemy.shot = enemy.type === "elite" ? rand(1.0, 1.7) : rand(1.5, 2.4);
        }
      });
      state.pickups.forEach(item => item.y += item.vy * dt);
      state.particles.forEach(part => {
        part.x += part.vx * dt;
        part.y += part.vy * dt;
        part.vy += 70 * dt;
        part.life -= dt;
      });

      for (const bullet of state.bullets) {
        for (const enemy of state.enemies) {
          if (bullet.dead || enemy.dead) continue;
          if (dist2(bullet, enemy) < (bullet.r + enemy.r) ** 2) {
            bullet.dead = true;
            enemy.hp -= bullet.damage;
            explode(bullet.x, bullet.y, bullet.color, 4);
            if (enemy.hp <= 0) {
              enemy.dead = true;
              const value = enemy.type === "elite" ? 140 : 70;
              state.combo += 1;
              state.kills += 1;
              state.score += value + Math.min(160, state.combo * 6);
              state.shake = Math.max(state.shake, enemy.type === "elite" ? 8 : 4);
              explode(enemy.x, enemy.y, enemy.type === "elite" ? "#ffd166" : "#36d6ff", enemy.type === "elite" ? 28 : 18);
              dropPickup(enemy);
              beep("boom");
            } else {
              beep("hit");
            }
          }
        }
      }

      for (const enemy of state.enemies) {
        if (!enemy.dead && dist2(p, enemy) < (p.r + enemy.r) ** 2) {
          enemy.dead = true;
          explode(enemy.x, enemy.y, "#ff5b73", 18);
          hitPlayer();
        }
      }

      for (const bullet of state.enemyBullets) {
        if (!bullet.dead && dist2(p, bullet) < (p.r + bullet.r) ** 2) {
          bullet.dead = true;
          hitPlayer();
        }
      }

      for (const item of state.pickups) {
        if (!item.dead && dist2(p, item) < (p.r + item.r + 4) ** 2) {
          item.dead = true;
          if (item.type === "power") p.power = Math.min(5, p.power + 1);
          if (item.type === "shield") p.shield = Math.min(5, p.shield + 1);
          state.score += 45;
          beep("pickup");
        }
      }

      state.bullets = state.bullets.filter(b => !b.dead && b.y > -32 && b.x > -40 && b.x < state.width + 40);
      state.enemyBullets = state.enemyBullets.filter(b => !b.dead && b.y < state.height + 40 && b.x > -50 && b.x < state.width + 50);
      state.enemies = state.enemies.filter(enemy => !enemy.dead && enemy.y < state.height + 60);
      state.pickups = state.pickups.filter(item => !item.dead && item.y < state.height + 30);
      state.particles = state.particles.filter(part => part.life > 0);
      updateUi();
    }

    function updateUi() {
      const p = state.player || { lives: 3, power: 1, shield: 0 };
      ui.score.textContent = state.score;
      ui.lives.textContent = state.practice ? "∞" : p.lives;
      ui.power.textContent = p.power;
      ui.level.textContent = state.level;
      ui.best.textContent = Math.max(bestScore, state.score);
      ui.kills.textContent = state.kills;
      ui.combo.textContent = state.combo;
      ui.shield.textContent = p.shield;
      ui.soundBtn.textContent = soundOn ? "♪" : "×";
    }

    function drawShip(x, y, size, invincible = false) {
      ctx.save();
      ctx.translate(x, y);
      if (invincible) ctx.globalAlpha = 0.56 + Math.sin(performance.now() * 0.026) * 0.28;
      const glow = ctx.createRadialGradient(0, 8, 4, 0, 8, size * 1.4);
      glow.addColorStop(0, "rgba(54, 214, 255, 0.45)");
      glow.addColorStop(1, "rgba(54, 214, 255, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 8, size * 1.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#dff8ff";
      ctx.beginPath();
      ctx.moveTo(0, -size * 1.35);
      ctx.lineTo(size * 0.72, size * 0.82);
      ctx.lineTo(0, size * 0.42);
      ctx.lineTo(-size * 0.72, size * 0.82);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#36d6ff";
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.78);
      ctx.lineTo(size * 0.28, size * 0.38);
      ctx.lineTo(0, size * 0.22);
      ctx.lineTo(-size * 0.28, size * 0.38);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#ffd166";
      ctx.beginPath();
      ctx.moveTo(-size * 0.22, size * 0.78);
      ctx.lineTo(0, size * 1.32);
      ctx.lineTo(size * 0.22, size * 0.78);
      ctx.fill();
      ctx.restore();
    }

    function drawEnemy(enemy) {
      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      const elite = enemy.type === "elite";
      ctx.fillStyle = elite ? "#ffd166" : "#ff5b73";
      ctx.beginPath();
      ctx.moveTo(0, enemy.r * 1.18);
      ctx.lineTo(enemy.r * 1.08, -enemy.r * 0.52);
      ctx.lineTo(enemy.r * 0.28, -enemy.r * 0.12);
      ctx.lineTo(0, -enemy.r * 1.12);
      ctx.lineTo(-enemy.r * 0.28, -enemy.r * 0.12);
      ctx.lineTo(-enemy.r * 1.08, -enemy.r * 0.52);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = elite ? "#fff2bd" : "#ffd4db";
      ctx.fillRect(-enemy.r * 0.42, -enemy.r * 0.04, enemy.r * 0.84, enemy.r * 0.18);
      ctx.fillStyle = "rgba(0, 0, 0, 0.34)";
      ctx.fillRect(-enemy.r, enemy.r * 1.38, enemy.r * 2, 3);
      ctx.fillStyle = elite ? "#63e6be" : "#36d6ff";
      ctx.fillRect(-enemy.r, enemy.r * 1.38, enemy.r * 2 * (enemy.hp / enemy.maxHp), 3);
      ctx.restore();
    }

    function draw() {
      const sx = state.shake ? rand(-state.shake, state.shake) : 0;
      const sy = state.shake ? rand(-state.shake, state.shake) : 0;
      ctx.save();
      ctx.clearRect(0, 0, state.width, state.height);
      ctx.translate(sx, sy);

      const bg = ctx.createLinearGradient(0, 0, 0, state.height);
      bg.addColorStop(0, "#030811");
      bg.addColorStop(0.55, "#071326");
      bg.addColorStop(1, "#130d18");
      ctx.fillStyle = bg;
      ctx.fillRect(-20, -20, state.width + 40, state.height + 40);

      for (const star of state.stars) {
        ctx.fillStyle = star.hue === "gold" ? "rgba(255, 209, 102, 0.86)" : "rgba(190, 238, 255, 0.82)";
        ctx.fillRect(star.x, star.y, star.size, star.size * 2.6);
      }

      ctx.strokeStyle = "rgba(54, 214, 255, 0.09)";
      ctx.lineWidth = 1;
      for (let y = (performance.now() / 26) % 56; y < state.height; y += 56) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(state.width, y);
        ctx.stroke();
      }

      state.pickups.forEach(item => {
        ctx.save();
        ctx.translate(item.x, item.y);
        ctx.rotate(performance.now() * 0.003);
        ctx.fillStyle = item.type === "power" ? "#36d6ff" : "#ffd166";
        ctx.beginPath();
        ctx.roundRect(-item.r, -item.r, item.r * 2, item.r * 2, 5);
        ctx.fill();
        ctx.fillStyle = "#05101a";
        ctx.font = "900 15px Inter, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(item.type === "power" ? "P" : "S", 0, 1);
        ctx.restore();
      });

      state.bullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.roundRect(b.x - 3, b.y - 16, 6, 24, 3);
        ctx.fill();
        ctx.shadowBlur = 0;
      });

      state.enemyBullets.forEach(b => {
        ctx.fillStyle = "#ff8fa0";
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      });

      state.enemies.forEach(drawEnemy);

      if (state.player) {
        if (state.player.shield > 0) {
          ctx.strokeStyle = "rgba(255, 209, 102, 0.72)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(state.player.x, state.player.y, 30 + Math.sin(performance.now() * 0.006) * 2, 0, Math.PI * 2);
          ctx.stroke();
        }
        drawShip(state.player.x, state.player.y, 18, state.player.invincible > 0);
      }

      state.particles.forEach(part => {
        ctx.globalAlpha = Math.max(0, part.life / part.maxLife);
        ctx.fillStyle = part.color;
        ctx.beginPath();
        ctx.arc(part.x, part.y, part.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });

      if (state.paused) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.32)";
        ctx.fillRect(0, 0, state.width, state.height);
      }
      ctx.restore();
    }

    function loop(time) {
      const dt = Math.min(0.033, (time - lastTime) / 1000 || 0);
      lastTime = time;
      update(dt);
      draw();
      if (state.running && !state.paused) rafId = requestAnimationFrame(loop);
    }

    function setTouchVector(event) {
      const rect = ui.stick.getBoundingClientRect();
      const point = event.touches ? event.touches[0] : event;
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      touchVector.x = clamp((point.clientX - cx) / (rect.width * 0.34), -1, 1);
      touchVector.y = clamp((point.clientY - cy) / (rect.height * 0.34), -1, 1);
    }

    ui.startBtn.addEventListener("click", () => {
      if (state.paused) {
        pauseToggle();
      } else {
        start(false);
      }
    });
    ui.practiceBtn.addEventListener("click", () => start(true));
    ui.soundBtn.addEventListener("click", () => {
      soundOn = !soundOn;
      updateUi();
    });
    ui.fireTouch.addEventListener("pointerdown", event => {
      event.preventDefault();
      shoot();
      keys.add(" ");
    });
    ui.fireTouch.addEventListener("pointerup", () => keys.delete(" "));
    ui.fireTouch.addEventListener("pointercancel", () => keys.delete(" "));
    ui.stick.addEventListener("pointerdown", event => {
      ui.stick.setPointerCapture(event.pointerId);
      setTouchVector(event);
    });
    ui.stick.addEventListener("pointermove", event => {
      if (event.buttons) setTouchVector(event);
    });
    ui.stick.addEventListener("pointerup", () => {
      touchVector = { x: 0, y: 0 };
    });
    ui.stick.addEventListener("pointercancel", () => {
      touchVector = { x: 0, y: 0 };
    });

    window.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", " ", "spacebar"].includes(key)) event.preventDefault();
      if (key === "p") pauseToggle();
      keys.add(key);
    });
    window.addEventListener("keyup", event => keys.delete(event.key.toLowerCase()));
    window.addEventListener("blur", () => keys.clear());
    window.addEventListener("resize", resize);

    if (!("roundRect" in CanvasRenderingContext2D.prototype)) {
      CanvasRenderingContext2D.prototype.roundRect = function roundRect(x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        this.beginPath();
        this.moveTo(x + radius, y);
        this.lineTo(x + w - radius, y);
        this.quadraticCurveTo(x + w, y, x + w, y + radius);
        this.lineTo(x + w, y + h - radius);
        this.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        this.lineTo(x + radius, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - radius);
        this.lineTo(x, y + radius);
        this.quadraticCurveTo(x, y, x + radius, y);
        return this;
      };
    }

    resize();
    seedStars();
    updateUi();
    draw();
  </script>
</body>
</html>
